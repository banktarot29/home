<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07111d"/>
      <stop offset="100%" stop-color="#0e1c2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#F0DC9A"/>
    </linearGradient>
    <linearGradient id="goldv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0DC9A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(201,168,76,0.06)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(201,168,76,0.06)" stroke-width="1"/>

  <!-- Gold border frame -->
  <rect x="30" y="30" width="1140" height="570" rx="4" fill="none" stroke="rgba(201,168,76,0.35)" stroke-width="1.5"/>
  <rect x="38" y="38" width="1124" height="554" rx="2" fill="none" stroke="rgba(201,168,76,0.12)" stroke-width="0.5"/>

  <!-- Corner ornaments -->
  <g stroke="rgba(201,168,76,0.6)" stroke-width="1.5" fill="none">
    <polyline points="30,70 30,30 70,30"/>
    <polyline points="1130,30 1170,30 1170,70"/>
    <polyline points="1170,560 1170,600 1130,600"/>
    <polyline points="70,600 30,600 30,560"/>
  </g>

  <!-- Compass icon (left side) -->
  <g transform="translate(140, 315)">
    <circle cx="0" cy="0" r="90" stroke="rgba(201,168,76,0.25)" stroke-width="1" fill="none"/>
    <circle cx="0" cy="0" r="70" stroke="rgba(201,168,76,0.15)" stroke-width="0.5" fill="none"/>
    <circle cx="0" cy="0" r="8" fill="#C9A84C"/>
    <!-- North pointer -->
    <polygon points="0,-65 6,-20 0,-8 -6,-20" fill="#C9A84C"/>
    <!-- South pointer -->
    <polygon points="0,65 6,22 0,8 -6,22" fill="#8B6914" opacity="0.7"/>
    <!-- Cardinal ticks -->
    <line x1="0" y1="-70" x2="0" y2="-80" stroke="#C9A84C" stroke-width="2"/>
    <line x1="0" y1="70" x2="0" y2="80" stroke="#C9A84C" stroke-width="1"/>
    <line x1="-70" y1="0" x2="-80" y2="0" stroke="#C9A84C" stroke-width="1"/>
    <line x1="70" y1="0" x2="80" y2="0" stroke="#C9A84C" stroke-width="1"/>
  </g>

  <!-- Divider line between compass and text -->
  <line x1="290" y1="80" x2="290" y2="550" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>

  <!-- Badge top -->
  <text x="330" y="115" font-family="Georgia, serif" font-size="13" fill="rgba(201,168,76,0.7)" letter-spacing="4">✦ ซินแสแบงค์ · AI FENG SHUI</text>

  <!-- Main headline -->
  <text x="330" y="195" font-family="Georgia, 'Noto Serif Thai', serif" font-size="58" font-weight="700" fill="white">วิเคราะห์ฮวงจุ้ย</text>
  <text x="330" y="265" font-family="Georgia, 'Noto Serif Thai', serif" font-size="58" font-weight="700" fill="white">บ้านคุณฟรี</text>

  <!-- Gold gradient underline -->
  <rect x="330" y="282" width="480" height="3" rx="2" fill="url(#gold)"/>

  <!-- Sub description -->
  <text x="330" y="330" font-family="'Noto Serif Thai', Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.65)">อัปโหลดภาพบ้าน · AI อ่านภาพจริง</text>
  <text x="330" y="362" font-family="'Noto Serif Thai', Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.65)">ระบุจุดที่ขัดพลังงาน · แนะนำวิธีปรับแบบไม่ทุบ ไม่รื้อ</text>

  <!-- Feature pills -->
  <g transform="translate(330, 410)">
    <rect x="0" y="0" width="148" height="36" rx="18" fill="rgba(201,168,76,0.12)" stroke="rgba(201,168,76,0.35)" stroke-width="1"/>
    <text x="74" y="23" font-family="Arial, sans-serif" font-size="13" fill="rgba(201,168,76,0.9)" text-anchor="middle">🏠 อ่านจากภาพจริง</text>

    <rect x="160" y="0" width="148" height="36" rx="18" fill="rgba(201,168,76,0.12)" stroke="rgba(201,168,76,0.35)" stroke-width="1"/>
    <text x="234" y="23" font-family="Arial, sans-serif" font-size="13" fill="rgba(201,168,76,0.9)" text-anchor="middle">🔮 ผลเฉพาะบ้านคุณ</text>

    <rect x="320" y="0" width="148" height="36" rx="18" fill="rgba(201,168,76,0.12)" stroke="rgba(201,168,76,0.35)" stroke-width="1"/>
    <text x="394" y="23" font-family="Arial, sans-serif" font-size="13" fill="rgba(201,168,76,0.9)" text-anchor="middle">⚡ ผลใน 30 วินาที</text>
  </g>

  <!-- CTA button area -->
  <rect x="330" y="480" width="220" height="52" rx="26" fill="url(#goldv)"/>
  <text x="440" y="512" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#080f1e" text-anchor="middle" letter-spacing="1">เริ่มวิเคราะห์เลย ✦</text>

  <!-- Expert badge bottom right -->
  <text x="1150" y="565" font-family="Arial, sans-serif" font-size="12" fill="rgba(201,168,76,0.45)" text-anchor="end" letter-spacing="1">ผู้เชี่ยวชาญด้านฮวงจุ้ยกว่า 12 ปี</text>
</svg>
